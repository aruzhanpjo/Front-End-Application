<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatiable" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log In Form</title>
        
        <!-- CSS -->
        <link rel="stylesheet" href="./style.css">
        <!-- Boxicon CSS -->

        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </head>
    <body>
        <section class="container forms">
            <div class="form login">
                <div class="form-content">
                    <header>Login</header>

                    <form action="#">
                        <div class="field input-field">
                            <input type="email" placeholder="Email" class="input">
                        </div>

                        <div class="field input-field">
                            <input type="password" placeholder="Password" class="password">
                            <i class='bx bxs-hide eye-icon' ></i>
                        </div>

                        <div class="form-link">
                            <a href="#" class="forgot-password">Forgot password??</a>
                        </div>

                        <div class="field button-field">
                            <button>Login</button> 
                        </div>

                        
                    </form>

                    <div class="form-link">
                        <span>Not a member? <a href="#" class="link signup-link">Sign Up</a></span>
                    </div>
                </div>

                <div class="line"></div>

                <div class="media-options">
                    <a href="#" class="field facebook">
                        <i class='bx bxl-facebook facebook-icon'></i>
                        <span>Login with Facebook</span>
                    </a>

                    <a href="#" class="field google">
                        <img src='./google.webp' alt="" class="google-img"></i>
                        <span>Login with Google</span>
                    </a>
                </div>
            </div>

            <!-- Sign up form-->

            <div class="form signup">
                <div class="form-content">
                    <header>Sign Up</header>

                    <form action="#">
                        <div class="field input-field">
                            <input type="email" placeholder="Email" class="input">
                        </div>

                        <div class="field input-field">
                            <input type="password" placeholder="Password" class="password">
                        </div>

                        <div class="field input-field">
                            <input type="password" placeholder="Password" class="password">
                            <i class='bx bxs-hide eye-icon' ></i>
                        </div>


                        <div class="field button-field">
                            <button>Sign Up</button> 
                        </div>

                        
                    </form>

                    <div class="form-link">
                        <span>Already have an account? <a href="#" class="link signup-link">Login</a></span>
                    </div>
                </div>

                <div class="line"></div>

                <div class="media-options">
                    <a href="#" class="field facebook">
                        <i class='bx bxl-facebook facebook-icon'></i>
                        <span>Login with Facebook</span>
                    </a>

                    <a href="#" class="field google">
                        <img src='./google.webp' alt="" class="google-img"></i>
                        <span>Login with Google</span>
                    </a>
                </div>
            </div>
        </section>

    <!-- JS-->
    <script src="./script.js"></script>

    </body>

</html>
